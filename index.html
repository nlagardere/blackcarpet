<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Hellband</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#111; color:#fff; font-family:sans-serif; margin:0; overflow:hidden">

    <div id="ui" style="display:none; justify-content:space-between; padding:20px; height:10vh">
        <h1 id="logo" style="margin:0; font-size:24px; cursor:pointer">HELLBAND</h1>
        <h2 id="score">1000</h2>
    </div>

    <div id="lobby" style="padding:20px; text-align:center; margin-top:15vh">
        <h1 style="color:red">HELLBAND</h1>
        <input id="nick" placeholder="Pseudo" style="padding:12px; border:none; width:200px"><br><br>
        <input id="roomInput" placeholder="Code salle" style="padding:12px; border:none; width:200px"><br><br>
        <button id="joinBtn" style="padding:15px 30px; background:#333; color:white; border:none; border-radius:8px">1. REJOINDRE</button>
        <div id="waitZone" style="display:none; margin-top:20px">
            <button id="startBtn" style="padding:15px 30px; background:red; color:white; border:none; border-radius:8px">2. LANCER</button>
        </div>
    </div>

    <div id="game" style="display:none; height:90vh; width:100vw; position:relative; background:#111"></div>

    <div id="gameover" style="display:none; position:fixed; inset:0; background:black; text-align:center; padding-top:30vh; z-index:9999">
        <h1 id="resTitle" style="color:red">GAME OVER</h1>
        <button onclick="location.reload()">REJOUER</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
